name: Publish to npm

# Trusted Publishing via OIDC — no long-lived npm token, no 2FA/OTP prompt.
# The npm registry trusts this exact workflow (repo Cimeci/Open42, file publish.yml)
# and mints a short-lived credential at publish time. Provenance is attached automatically.
#
# Release flow:
#   1. Bump the version:  npm version patch   (creates a commit + tag)
#   2. Push:              git push && git push --tags
#   3. Cut a GitHub Release for that tag → this workflow publishes @open42/cli.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # REQUIRED for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node ships npm 10.x.
      # Pin to the 11.x line: OIDC-capable and compatible with this Node
      # (npm@latest/12.x now requires Node >= 22.22, which the runner may lag).
      - name: Upgrade npm
        run: npm install -g npm@11

      # `npm install` (not `npm ci`): the committed lockfile is generated on
      # macOS and omits some Linux-only optional native bindings (vitest 4 /
      # rolldown), which makes the strict `npm ci` reject it on the runner.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      # No NODE_AUTH_TOKEN: the OIDC id-token above is the credential.
      # Access (public) comes from package.json "publishConfig".
      - name: Publish
        run: npm publish
